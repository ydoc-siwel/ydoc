<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .video-card {
            background-color: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #000;
        }
        
        .video-info {
            padding: 15px;
        }
        
        .video-title {
            font-size: 14px;
            margin-bottom: 10px;
            word-break: break-word;
        }
        
        .download-btn {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        
        .download-btn:hover {
            background-color: #45a049;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Gallery</h1>
        <div id="video-container" class="video-grid">
            <div class="loading">Loading videos...</div>
        </div>
    </div>

    <script>
        // Configuration: Update this path to your video manifest file
        const VIDEO_MANIFEST = 'videos.json';
        
        async function loadVideos() {
            const container = document.getElementById('video-container');
            
            try {
                const response = await fetch(VIDEO_MANIFEST);
                
                if (!response.ok) {
                    throw new Error(`Failed to load manifest: ${response.status}`);
                }
                
                const videos = await response.json();
                
                if (!Array.isArray(videos) || videos.length === 0) {
                    throw new Error('No videos found in manifest');
                }
                
                container.innerHTML = '';
                
                videos.forEach((video, index) => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    
                    const videoElement = document.createElement('video');
                    videoElement.controls = true;
                    videoElement.src = video.path;
                    videoElement.preload = 'metadata';
                    
                    const info = document.createElement('div');
                    info.className = 'video-info';
                    
                    const title = document.createElement('div');
                    title.className = 'video-title';
                    title.textContent = video.title || `Video ${index + 1}`;
                    
                    const downloadLink = document.createElement('a');
                    downloadLink.className = 'download-btn';
                    downloadLink.href = video.path;
                    downloadLink.download = video.filename || video.path.split('/').pop();
                    downloadLink.textContent = 'Download';
                    
                    info.appendChild(title);
                    info.appendChild(downloadLink);
                    card.appendChild(videoElement);
                    card.appendChild(info);
                    container.appendChild(card);
                });
                
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading videos: ${error.message}<br><br>Make sure videos.json exists and contains a list of video paths.</div>`;
            }
        }
        
        // Load videos when page loads
        window.addEventListener('DOMContentLoaded', loadVideos);
    </script>
</body>
</html>
